body:
  text: 無擇漢書別作己丑己丑二十六日庚寅二十七日辛卯二十八日漢書本紀五月丙申四日功臣表七月丙申四日史記作十一月壬申十一月無壬申誤史記功臣表五月丙寅漢書作九月推校五月九月俱無丙寅恐是四月與南宮扶椏二侯同封也諸侯王表二年十一月癸亥是日呂王呂嘉元年名臣表作十二月呂王台薨子嘉代推校十一月無癸亥癸亥十二月四日名臣表爲是二年端蒙單閼大十三正月小庚寅二月大己未三月小己丑四月大戊午五月小戊子六月大丁巳七月小丁亥八月大丙辰九月大丙戌後九月小丙辰十月大乙酉十一月小乙卯十二月大甲申漢書本紀正月乙卯二十六日史記惠景閒侯表五月丙申九日漢書本紀六月丙戌晦日有食之史記諸侯王表七月癸巳七日漢書作十月癸丑推校十月無癸丑史記表爲是三年游兆執徐小十二正月小甲寅二月大癸未三月小癸丑四月大壬午五月小壬子六月大辛巳七月小辛亥八月大庚辰九月小庚戌十月大己卯十一月小己酉十二月大戊寅
