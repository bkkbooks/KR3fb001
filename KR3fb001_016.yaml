body:
  text: 甲申乙亥乙未乙卯癸亥辛卯辛亥辛未壬寅丁未丁卯丁亥辛巳癸亥癸未癸卯庚申己卯己亥己未己亥乙未乙卯乙亥戊寅辛亥辛未辛卯丁巳丁卯丁亥丁未丙申癸未癸卯癸亥乙亥己亥己未己卯甲寅乙卯乙亥乙未癸巳辛未辛卯辛亥壬申丁亥丁未丁卯辛亥癸卯癸亥癸未庚寅己未己卯己亥案此蔀遂之名爲顓頊厤正法日起己巳年起乙卯也嘫以推校秦漢之際閏朔多不合秦用顓頊厤蓋年起乙卯而日起丁卯雜采它法以成之非純用顓
