body:
  text: 十一歲青龍抂乙卯歲前大餘六小餘二百四十六大餘二十小餘八其年冬至甲申小餘八天正朔旦庚午小餘二百四十六立春己巳小餘二十九人正朔旦己巳小餘三百畸四續漢志云課兩元端朔差三百四中節之餘二十九皆合惟云閏餘差自五十分二之三為有舛誤今以術推之殷曆于乙卯人正中氣前閏餘二百二十八分之百二十二節氣前二百二十八分之百十八半又顓頊曆肁專于人正之節節前無閏餘是早半月為分百十四去之實差四分半倍之為四百五十六分之九三約之為百五十二分之三是知續漢志之自為百之訛分二為二分之到矣蔀名第一遂歲名第二遂歲名第三遂歲名己巳乙卯乙亥乙未戊申辛未辛卯辛亥丁亥丁亥丁未丁卯丙寅癸卯癸亥癸未乙巳己未己卯己亥
