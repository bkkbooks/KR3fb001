body:
  text: 新化鄒漢勛叔績余幼讀史記漢書苦其日子稠濁無從是正後習厤考以今之密術上推其至朔日閏多不合久之乃悟當時各有行之厤因以差池耳考始皇二十又七年下訖漢大初凡百又十七年𢻱用顓頊厤而厤書厤志皆不箸其術自來學者無從考校余是以發憤檢羣史厤論及史漢中至朔日閏編成一書蓋仿春秋長厤衟也續又將緝大初以下至于大統各爲一篇以輔正史庶幾爲史學者有所馮依云史記厤書云秦滅六國兵戎極煩又升至尊之日淺未遑暇也而亦頗推五勝自以爲獲水德之瑞更名河日德水而正以十月色上黑然厤度閏餘未能暏其眞也漢興高祖日北畤待我而起亦自以爲獲水德之瑞雖明習厤如張蒼等咸以爲然是時天下初定方綱紀大基高后女主皆未遑故襲秦正朔服色至孝文時魯人公孫臣以終始五德上書言漢得土德宜更元改正朔易服色當有瑞瑞黃龍見事下丞相張蒼張蒼亦學律
