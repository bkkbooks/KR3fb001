body:
  text: 正月小乙未二月大甲子三月小甲午四月大癸亥五月小癸巳六月大壬戌七月小壬辰八月大辛酉九月大辛卯後九月小辛酉十月大庚寅十一月小庚申十二月大己丑史記惠景閒侯表四月丁巳是日申屠嘉初封漢書表同推校四月無丁巳又史記名臣表載二年封漢書功臣表云七年薨本紀孝景二年六月丞相嘉薨表衟從封後年數起自孝文後三年至孝景二年適七年則封抂後二年明矣表又日嘉以丞相侯考嘉以後二年八月庚午爲丞相而八月無丁巳則是九月明矣九月二十一日丁巳四年昭陽大荒落小十二正月小己未二月大戊子三月小戊午四月大丁亥五月小丁巳六月大丙戌七月小丙辰八月大乙酉九月小乙卯十月大甲申十一月大甲寅十二月小甲申漢書五行志四月丙辰晦日有食之本紀作丙寅晦非五年橫艾敦牂大十三正月大癸丑二月小癸未三月大壬子四月小壬午五月大辛亥六月小辛巳七月大庚戌八月小庚辰九月大己酉後九月小己卯十月大戊申十一月小戊寅十二月大丁未
