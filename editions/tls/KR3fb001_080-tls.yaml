body:
  text: 二十六日史記作丁巳誤天文志五月甲午二十四日六月壬戌二十二日癸亥二十三日甲子二十四日丁卯二十七日壬申七月三日有日無月本紀九月戊戌晦日有食之四年端蒙協洽小十二正月小戊辰二月大丁酉三月小丁卯四月大丙申五月小丙寅六月大乙未七月小乙丑八月大甲午九月小甲子十月大癸巳十一月小癸亥十二月大壬辰漢書天文志四月丙申一日本紀四年十月戊午日有食之此與孝景四年同亦是妄人所增益五年游兆涒灘大十三正月小壬戌二月大辛卯三月小辛酉四月大庚寅五月大庚申六月小庚寅七月大己未八月小己丑九月大戊午後九月小戊子十月大丁巳十一月小丁亥十二月大丙辰史記諸侯王表三月丁巳三月無丁巳是日常山憲王舜初封案本紀中五年夏立子舜爲常山王封十侯下有六月推校五月亦無丁巳丁巳四月二十八日也則王表誤明矣惠景閒侯表四月丁巳二十八日五月丁卯八日甲戌十五日丁丑十八日漢書天文志四月乙巳十六日史記
