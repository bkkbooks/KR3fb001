body:
  text: 厤以爲非是罷之其後黃龍見成紀張蒼自黜所欲論箸不成而新垣平以望氣見頗言正厤服色事貴幸後作亂故孝文皇帝癈不復問漢書律厤志五伯之末史官喪紀疇人子弟分㪔或抂夷狄故其所記有黃帝顓頊夏殷周及魯厤戰國擾攘秦兼天下未皇暇也亦頗推五勝而自以爲獲水德乃以十月爲正色上黑漢興方綱紀大基庶事草創襲秦正朔以北平侯張蒼言用顓頊厤比于六厤疏闊中冣爲微近然正朔服色未覩其眞而朔晦月見弦望满虧多非是漢書蓺文志顓頊厤二十一卷續漢志律厤志議郎蔡邕議厤數精微去聖久遠得失迭更術數無常是以承秦厤用顓頊元用乙卯百有二歲劉昭注蔡邕厤論日顓頊厤術日天元正月己巳朔旦立春俱以日月起于天廟營室五度今月令孟春之月日抂營室又光和二年萬年公乘王漢上月食注自章和元年到今年凡九十三歲合百九十六食與官厤河平元年月
