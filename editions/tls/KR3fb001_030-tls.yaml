body:
  text: 漢書高帝本紀二月癸未四日六月壬午五日史紀秦楚之際月表是年有後九月漢書高帝本紀三年十月甲戌晦日有食之十一月癸卯晦日有食之三年彊梧作噩小十二正月小甲戌二月大癸卯三月小癸酉四月大壬寅五月大壬申六月小壬寅七月大辛未八月小辛丑九月大庚午十月小庚子十一月大己巳十二月小己亥史記諸侯王表四年十月乙丑二十六日四年徒維淹茂小十二正月大戊辰二月小戊戌三月大丁卯四月小丁酉五月大丙寅六月小丙申七月大乙丑八月大乙未九月小乙丑十月大甲午十一月小甲子十二月大癸巳漢書異姓王表五年十二月乙丑十二月無乙丑乙丑十一月二日也案漢書表是日張耳薨史記表張耳薨無日而前四年十月乙丑爲淮南初王武王英布元年史表衟書初封日漢書于此缺蓋傳寫者誤迻于耳薨之上耳五年祝犂大淵獻大十三正月小癸亥二月大壬辰三月小壬戌四月大辛卯五月小辛酉六月大庚寅七月小庚申八月大己丑
