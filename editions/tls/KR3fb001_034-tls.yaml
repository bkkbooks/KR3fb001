body:
  text: 子十五日四月癸未二十九日漢書本紀五月丙午二十二日史記功臣表六月丁亥六月無丁亥丁亥七月四日是日侯者四人不知日月孰誤七月庚寅七日戊戌十五日八月丙辰四日甲子十二日丁丑二十五日漢書功臣表七年十月癸亥十二日史記作六月而書于十月之前誤史記功臣表甲子十三日漢書功臣表戊辰十七日史記作七月誤本紀十二月辛卯十二月無辛卯漢書是日立子如意爲代王代王喜棄國抂是月而史記紀代王喜棄國抂八年功臣表同喜爲合陽侯史記漢書表皆抂八年九月丙午史記漢書皆日喜歸自洛陽廢以爲合陽侯則如意之爲代王當抂八年九月丙午之後八年十二月亦無辛卯九年十二月二十二日乃是辛卯則漢書誤無疑矣七年昭陽赤奮若小十二正月小辛巳二月大庚戌三月小庚辰四月大己酉五月大己卯六月小己酉七月大戊寅八月小戊申九月大丁丑十月小丁未十一月大丙子十二月小丙午史記功臣表正月己酉二十九日漢書功臣表三月壬寅二十三日史記作丙寅誤七月丙申十九日史記作丙辰誤史記功臣表八年十月癸丑七日丙辰十日漢書功臣表癸酉二十七日史記作七月癸酉誤史記功臣表十二月丁未二日丁卯二十二日漢書作二月丁卯是二十三日未審孰是
