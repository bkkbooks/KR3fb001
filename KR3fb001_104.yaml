body:
  text: 五月小壬寅六月大辛未七月小辛丑八月大庚午九月小庚子十月大己巳十一月小己亥十二月大戊辰漢書王子侯表四月戊寅七日今史記本誤升一位作元狩元年非善本也七月辛卯乙酉七月無辛卯乙酉史記作十月推十月十一日乙酉十七日辛卯史記是二年游兆攝提格大十三正月小戊戌二月大丁卯三月小丁酉四月大丙寅五月小丙申六月大乙丑七月大乙未八月小乙丑九月大甲午後九月小甲子十月大癸巳十一月小癸亥十二月大壬辰漢書百官表二月壬辰二十六日三月辛亥十五日三年彊梧單閼小十二正月小壬戌二月大辛卯三月小辛酉四月大庚寅五月小庚申六月大己丑七月小己未八月大戊子九月大戊午十月小戊子十一月大丁巳十二月小丁亥漢書本紀正月戊子二十七日四年十一月甲子八日史記建元以來侯表丁卯十一日四年徒維執徐大十三
