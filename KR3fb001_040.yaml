body:
  text: 一日己酉二十三日漢書作己丑三日乙酉二月無乙酉恐同上俱是己酉己巳漢書亦作乙酉恐亦是己酉之譌辛亥二十五日推校是月前有丁亥後有辛亥則中無乙酉己巳明矣故知前乙酉己巳皆誤三月癸酉十七日諸侯王表三月丙寅十日是日淮陽王友初封丙午三月無丙午是日梁王恢初封案本紀二王同立則丙午亦是丙寅之譌十二月庚午是日淮南厲王長初封漢書作十月案本紀是年七月淮南王布反立子長爲王則二表皆誤又推校十月十二月皆無庚午七月十六日乃爲庚午二表之誤明矣功臣表七月己丑七月無己丑己丑八月六日乙丑七月十一日乙己形近當是乙丑之譌八月甲辰二十一日十二年十月乙未十三日戊戌十六日辛丑十九日壬寅二十日漢書功臣表己酉二十七日史記作乙酉三日誤史記功臣表十一月庚辰二十八日十二月丁亥六日癸卯二十二日十二年游兆敦牂小十二正月小壬子二月大辛巳三月小辛亥四月大庚辰五月小庚戌六月大己卯七月大己酉八月小己卯九月大戊申十月小戊寅十一月大丁未十二月小丁丑史記功臣表正月乙丑十四日乙酉正月無乙酉是日成陽定侯奚意封上穀陽定侯馮谿壯敬侯許倩皆以乙丑封恐是同日傳寫者誤也漢書諸侯王表二月甲午十四日史記作三月誤功臣表三月丁巳七日史記
