body:
  text: 曆以為非是罷之其後黃龍見成紀張蒼自黜所欲論箸不成而新垣平以望氣見頗言正曆服色事貴幸後作亂故孝文皇帝廢不復問漢書律曆志五伯之末史官喪紀疇人子弟分㪔或抂夷狄故其所記有黃帝顓頊夏殷周及魯曆戰國擾攘秦兼天下未皇暇也亦頗推五勝而自以為獲水德乃以十月為正色上黑漢興方綱紀大基庶事草創襲秦正朔以北平侯張蒼言用顓頊曆比于六曆疏闊中最為微近然正朔服色未覩其真而朔晦月見弦望滿虧多非是漢書藝文志顓頊曆二十一卷續漢志律曆志議郎蔡雍議曆數精微去聖久遠得失迭更術數無常是以承秦曆用顓頊元用乙卯百有二歲劉昭注蔡雍曆論日顓頊曆術日天元正月己巳朔旦立春俱以日月起于天廟營室五度今月令孟春之月日抂營室又光和二年萬年公乘王漢上月食注自章和元年到今年凡九十三歲合百九十六食與官曆河平元年月
  hash: sha256:ba262a9dc9ac63d38bdd4b3e3e2f9008d42e76f4861dfeeb4c85031876ad6645
