body:
  text: 侯表八月壬子二日四年徒維困敦大十三正月大戊寅二月小戊申三月大丁丑四月小丁未五月大丙子六月大丙午七月小丙子八月大乙巳九月小乙亥後九月大甲辰十月小甲戌十一月大癸卯十二月小癸酉漢書本紀四月己巳二十三日是日立皇太子榮膠東王徹諸侯王表及史記表皆作乙巳推校四月無乙巳日誤史記本紀六月甲戌二十九日漢書天文志七月癸未八日九月己未九月無己未下有戊寅戊寅九月四日則此己未當是八月十五日戊寅四日史記本紀是年有後九月漢書本紀十月戊戌晦日有食之五行志無之本紀敍此食于四年七月之後當是妄人不知漢書衟敍十月于歲首剌取它書之文附益于此且推校十月晦日是戊寅十一月晦日是戊申又此食五行志所無故知妄也五年祝犂赤奮若小十二正月大壬寅二月小壬申三月大辛丑四月小辛未五月大庚子六月小庚午七月大己亥八月小己巳九月大戊戌十月大戊辰十一月小戊戌十二月大丁卯六年商橫攝提格大十三
