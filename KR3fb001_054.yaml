body:
  text: 臣表食其為左丞相亦抂九月以之相證紀誤明矣九月辛酉十一日壬戌十二日名臣表及漢書百官表皆作丙戌九月無丙戌誤後九月晦日己酉漢書作閏月二十九日也本紀孝文元年十月庚戌一日辛亥二日是日右丞相平徙為左丞相大尉勃為右丞相漢書百官表同史記名臣表別作十一月辛卯非是壬子三日惠景間侯表十一月辛丑二十二日
