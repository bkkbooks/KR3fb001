body:
  text: 八年橫艾攝提格大十三正月大乙亥二月小乙巳三月大甲戌四月小甲辰五月大癸酉六月小癸卯七月大壬申八月大壬寅九月小壬申後九月大辛丑十月小辛未十一月大庚子十二月小庚午史記功臣表三月丙戌十三日辛巳月雖有辛巳嘫表抂丙戌後依漢書作辛卯爲是漢書功臣表辛卯十八日史記功臣表四月辛卯四月無辛卯漢書三月有辛卯則四月不得有辛卯明矣是日爲甯莊侯魏選封日當是同吳房侯封宜作三月辛卯爲是六月戊申六日漢書作戊辰戊辰二十六日誤壬子十日七月癸酉二日九月丙午九月無丙午丙午後九月六日月誤後九月己未十九日漢書作九月己未九月無己未漏後字九年十一月壬寅三日漢書作十二月誤九年尙章單閼小十二正月大己亥二月小己巳三月大戊戌四月小戊辰五月大丁酉六月小丁卯七月大丙申八月小丙寅九月大乙未十月小乙丑十一月大甲午十二月大甲子漢書本紀正月丙寅二十八日史記功臣表三月丙辰十九日漢書作丙戌誤四月戊寅十一日又高京侯封日作丙寅四月無丙寅漢書亦
