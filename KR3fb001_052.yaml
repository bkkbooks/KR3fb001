body:
  text: 七年商橫涒灘小十二正月小辛酉二月大庚寅三月小庚申四月大己丑五月小己未六月大戊子七月小戊午八月大丁亥九月小丁巳十月大丙戌十一月小丙辰十二月大乙酉漢書本紀正月丁丑十七日己丑晦日有食之既五月辛未十三日史記諸侯王表七月丁卯十日漢書作十一月丁巳十一月無丁巳誤漢書百官表七月辛巳二十四日史記諸侯王表八年十月辛丑十六日漢書作七月癸丑癸丑八年七月二日高后本紀合史記是八年昭陽作噩大十三正月大乙卯二月小乙酉三月大甲寅四月小甲申五月大癸丑六月小癸未七月大壬子八月小壬午九月大辛亥後九月小辛巳十月大庚戌十一月小庚辰十二月大己酉史記惠景閒侯表四月丁酉十四日五月丙辰四日本紀七月辛巳三十日八月丙午二十五日八月庚申漢書同八月無庚申庚申九月十日史記前敍丙午巳有八月不宜復冠八月子庚申且與下辛酉壬戌戊辰相連下無九月即接後九月晦日己酉故知八月是九月之訛且壬戌即審食其為左丞相之日名
