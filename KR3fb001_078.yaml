body:
  text: 九月大辛亥十月小辛巳十一月大庚戌十二月小庚辰史記本紀四月乙巳二十三日二年尚章大荒落大十三正月大己酉二月小己卯三月大戊申四月小戊寅五月大丁未六月小丁丑七月大丙午八月小丙子九月大乙巳後九月大乙亥十月小乙巳十一月大甲戌十二月小甲辰史記諸侯王表四月乙巳二十八日漢書本紀九月甲戌晦日有食之史記惠景閒侯表三年十一月庚子二十七日漢書天文志十一月庚午十一月無庚午庚午十二月二十七日史記惠景閒侯表十二月丁丑十二月無丁丑案表以是日封胸奴降王六人為侯史記本紀中三年春胸奴王二人率其徒來降皆封為衟侯下有三月又推校二月無丁丑正月五日為丁丑則封胸奴降王當抂正月而二表誤明矣三年焉逢敦牂大十三正月大癸酉二月小癸卯三月大壬申四月小壬寅五月大辛未六月小辛丑七月大庚午八月小庚子九月大己巳十月小己亥十一月大戊辰十二月大戊戌漢書天文志正月丁亥十五日諸侯王表三月丁酉
