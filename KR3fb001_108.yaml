  text: 九月小辛未十月大庚子十一月小庚午十二月大己亥史記建元以來侯表三月乙酉十三日四月癸亥二十一日五月壬申一日七月乙酉十四日元封元年昭陽協洽大十三正月小己巳二月大戊戌三月小戊辰四月大丁酉五月小丁卯六月大丙申七月小丙寅八月大乙未九月大乙丑後九月小乙未十月大甲子十一月小甲午十二月大癸亥史記建元以來侯表正月壬午十四日四月丁酉一日漢書本紀癸卯七日史記建元以來侯表五月乙卯漢書作正月正月五月俱無乙卯王子侯表丙午五月無丙午建元以來王子侯表閏月癸卯九日徐廣以為閏四月案四月有癸卯則閏月非閏四月明矣二年橫艾涒灘小十二正月小癸巳二月大壬戌三月小壬辰四月大辛酉五月小辛卯六月大庚申七月小庚寅八月大己未九月小己丑十月大戊午十一月小戊子十二月大丁巳三年尚章作噩小十二
