body:
  text: 九月小己未後九月大戊子十月小戊午十一月大丁亥十二月大丁巳漢書高帝本紀二月甲午三日史記諸侯王表二月乙未四日漢書本紀六月壬辰三日史記諸侯王表九月壬子九月無壬子案史記表是日燕初王盧綰元年漢書異姓表及百官表綰封皆抂後九月蓋史記漏後字也壬子後九月二十五日高祖功臣表六年十二月甲申二十八日六年商橫困敦小十二正月小丁亥二月大丙辰三月小丙戌四月大乙卯五月小乙酉六月大甲寅七月小甲申八月大癸丑九月小癸未十月大壬子十一月小壬午十二月大辛亥史記高祖功臣表正月丙戌案是日周呂侯呂澤建成康侯呂釋之封日也漢書表建成侯作四月丙戌誤四月無丙戌丙戌十二月三十日恐是前年忘置頻大月故丙戌迻爲正月一日漢書本紀正月丙午二十日史記高祖功臣表丁未二十一日戊申二十二日漢書本紀壬子二十六日案史記諸侯王表作甲子正月無甲子日誤史記功臣表戊午案是日東武貞侯郭蒙始封日正月有丙戌不得有戊午戊午二月三日下三月戊子是雍齒封日恐是三月戊子之譌高帝以權封雍齒不欲一人獨封故使蒙同之三月戊子三日丙申十一日庚
