body:
  text: 九月大丙申十月大丙寅十一月小丙申十二月大乙丑漢書本紀三月乙卯十七日百官表五月丁巳二十日五年昭陽大淵獻小十二正月小乙未二月大甲子三月小甲午四月大癸亥五月小癸巳六月大壬戌七月小壬辰八月大辛酉九月小辛卯十月大庚申十一月小庚寅十二月大己未漢書王子侯表正月壬子十八日史記作五月五月二十日壬子未審孰是本紀七月乙巳十四日六年橫艾困敦大十三正月大己丑二月小己未三月大戊子四月小戊午五月大丁亥六月小丁巳七月大丙戌八月小丙辰九月大乙酉後九月小乙卯十月大甲申十一月小甲寅十二月大癸未史記王子侯表七月乙巳二十日後九月壬戌八日建元以來侯表丙寅十二日漢書表作元朔元年後九月丙寅元朔元年不宜有閏月誤漢書王子侯表元朔元年十月丁酉十四日史記作十一月誤十二月甲辰二十二日元朔元年尚章赤奮若小十二
