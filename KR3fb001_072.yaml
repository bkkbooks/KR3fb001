body:
  text: 乙巳十二日漢書天文志七月乙丑三日史記本紀四月乙卯二十二日己巳敍于乙卯之後當是丁巳之訛丁巳二十四日漢書天文志二年十一月丙子十一月無丙子丙子十二月十七日二年游兆淹茂小十二正月小庚寅二月大己未三月小己丑四月大戊午五月小戊子六月大丁巳七月小丁亥八月大丙辰九月小丙戌十月大乙卯十一月小乙酉十二月大甲寅史記諸侯王表三月甲寅二十六日本紀四月壬午二十五日漢書百官表八月丁未是日御史大夫陶青為丞相推校八月無丁未當是丁巳與朝錯同日除也丁巳二日是日左內史朝錯為御史大夫三年彊梧大淵獻小十二正月小甲申二月大癸丑三月大癸未四月小癸丑五月大壬午六月小壬子七月大辛巳八月小辛亥九月大庚辰十月小庚戌十一月大己卯十二月小己酉史記本紀正月乙巳二十二日漢書百官表壬子二十九日五行志二月壬午晦日食本紀作壬子誤史記本紀六月乙亥二十四日又諸侯王表是日淮陽王徙魯中山靖王初封漢書別作乙巳推校六月無乙巳誤又惠景閒侯表魏其侯亦作乙巳皆乙亥之訛魏其封日又見本紀尚作乙亥惠景閒
