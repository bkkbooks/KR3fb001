body:
  text: 本紀六月丁巳二十八日漢書本紀八月己酉二十一日六年強梧作噩小十二正月小丙戌二月大乙卯三月小乙酉四月大甲寅五月小甲申六月大癸丑七月小癸未八月大壬子九月大壬午十月小壬子十一月大辛巳十二月小辛亥史記諸侯王表五月丙戌三日本紀二月己卯二十五日七月辛亥日食二十九日漢書辛亥上有晦字非後元年徒維淹茂小十二正月大庚辰二月小庚戌三月大己卯四月小己酉五月大戊寅六月小戊申七月大丁丑八月小丁未九月大丙子十月小丙午十一月大乙亥十二月大乙巳史記本紀三月丁酉十九日漢書天文志五月壬午五日丙戌九日史記本紀七月乙巳日食漢書五行志先晦一日是本紀作晦非漢書百官表丙午三十日史記本紀八月壬辰七月先晦一日乙巳則八月無壬辰是日御史大夫綰為丞相直不疑為御史大夫史記本紀名臣表漢書百官表皆抂八月又惠景間侯表塞侯直不疑以御史大夫封抂八月漢書功臣表亦同則是八月明矣八月六日壬子十六日壬戌二十六日壬申十日丙辰二十二日戊辰不知干支孰誤
