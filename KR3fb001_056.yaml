body:
  text: 新化鄒漢勛叔績孝文元年橫艾淹茂小十二正月小己卯二月大戊申三月大戊寅四月小戊申五月大丁丑六月小丁未七月大丙子八月小丙午九月大乙亥十月小乙巳十一月大甲戌十二月小甲辰漢書外戚侯表正月乙巳二十七日史記作四月四月無乙巳且是日薄昭初封史記漢書本紀皆抂正月則惠景閒侯表誤明矣惠景閒侯表四月辛亥四日辛未二十四日六月丙寅二十日漢書百官表八月辛未二十六日史記名臣表二年十一月乙亥二日漢書本紀癸卯晦日有食之二年尚章大淵獻大十三正月大癸酉二月小癸卯三月大壬申四月小壬寅五月大辛未六月小辛丑七月大庚午八月大庚子九月小庚午後九月大己亥十月小己巳十一月大戊戌十二月小戊辰漢書本紀正月丁亥十五日史記諸侯王表二月乙卯十三日是日立河閒文王辟強等六人史記表漢書表皆抂二月史記本紀漢書本紀皆抂三
