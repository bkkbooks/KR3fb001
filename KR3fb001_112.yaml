body:
  text: 正月小庚子二月大己巳三月小己亥四月大戊辰五月小戊戌六月大丁卯七月小丁酉八月大丙寅九月小丙申十月大乙丑十一月小乙未即大初歲前之閏月大初元年十一月甲子朔旦冬至五行志十一月乙酉夏五月正曆顓頊曆大初歲前無閏其十一月二十七日辛酉夜半冬至顓頊曆命日起寅初實壬戌夜半也入夜半小餘一少十二月甲子平旦後小餘百九合朔大初曆以大初元年為蔀首無大餘無小餘無大餘無小餘而以夜半命日是棄顓頊曆氣節之大餘一小餘三十大朔小餘二百六十一大也此兩曆相續之際故𦯞論之
