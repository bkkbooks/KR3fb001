body:
  text: 由生命日顓頊厤其實夏厤也殷作殷厤更以十一月甲子合朔冬至爲上元周人因之歫羲和千祀昏明中星率差半次夏時直月節者皆當十有二中故因循夏令其後呂不韋得之以爲秦法更考中星斷取近歫以乙卯歲正月己巳合朔立春爲上元洪範傳曰厤記始于顓頊上元大始閼蒙攝格之歲畢陬之月朔日己巳立春七曜抂營室五度是也案閼蒙攝格四字當作旃蒙單閼涉筆偶譌也其以甲寅爲元者顓頊厤之別一術宋書所謂顓頊夏周並有二術及命厤序云此術設元甲寅者是矣開元占經古今厤上元巳來至今開元二年甲寅歲積顓頊厤上元乙卯至今二百七十六萬一千一十九算外章歲十九章閏七案開元占經又云殷厤上元甲寅至今二百七十六萬一千八十算外章歲十九章閏七又漢書律厤志云魯釐公五年殷厤以爲壬子朔旦冬至其年青龍丙寅殷厤十三蔀首也彼此推校是顓頊第一蔀首抂殷厤第一蔀首後六十一歲殷厤第一蔀首後六
