body:
  text: 由生命日顓頊曆其實夏曆也殷作殷曆更以十一月甲子合朔冬至為上元周人因之歫羲和千祀昏明中星率差半次夏時直月節者皆當十有二中故因循夏令其後呂不韋得之以為秦法更考中星斷取近歫以乙卯歲正月己巳合朔立春為上元洪範傳曰曆記始于顓頊上元大始閼蒙攝格之歲畢陬之月朔日己巳立春七曜抂營室五度是也案閼蒙攝格四字當作旃蒙單閼涉筆偶訛也其以甲寅為元者顓頊曆之別一術宋書所謂顓頊夏周並有二術及命曆序云此術設元甲寅者是矣開元占經古今曆上元巳來至今開元二年甲寅歲積顓頊曆上元乙卯至今二百七十六萬一千一十九算外章歲十九章閏七案開元占經又云殷曆上元甲寅至今二百七十六萬一千八十算外章歲十九章閏七又漢書律曆志云魯釐公五年殷曆以為壬子朔旦冬至其年青龍丙寅殷曆十三蔀首也彼此推校是顓頊第一蔀首抂殷曆第一蔀首後六十一歲殷曆第一蔀首後六
