body:
  text: 辛卯辛未辛卯辛亥庚午丁亥丁未丁卯己酉癸卯癸亥癸未戊子己未己卯己亥自秦始皇二十一年乙亥入第一遂壬午蔀歲首立春命日起寅初乙亥始皇二十一年端蒙大淵獻小十二正月朔壬午丙子始皇二十二年遊兆困敦小十二正月朔丙子丁丑始皇二十三年強梧赤奮若大十三正月朔庚午戊寅始皇二十四年徒維攝提格小十二正月朔甲午己卯始皇二十五年祝犂單閼小十二正月朔己丑庚辰始皇二十六年商橫執徐大十三正月朔癸未右六歲不知秦用何曆以顓頊曆蔀首所起故箸之始皇二十七年昭陽大荒落小十二端月小丁未二月大丙子三月小丙午四月大乙亥五月小乙巳六月大甲戌七月小甲辰八月大癸酉九月大癸卯十月小癸酉十一月大壬寅十二月小壬申
