body:
  text: 二年祝犂大淵獻大十三正月小乙亥二月大甲辰三月小甲戌四月大癸卯五月小癸酉六月大壬寅七月小壬申八月大辛丑九月小辛未後九月大庚子十月小庚午十一月大己亥十二月小己巳史記名臣表六月丁丑六月無丁丑表是日御史大夫岑邁卒漢書百官表御史大夫無岑邁直不疑以孝景後元年為御史大夫武帝即位與丞相綰俱以過免則中閒不得有岑邁明矣名臣表孝景前四年御史大夫蚡六年御史大夫陽陵侯岑邁七年御史大夫舍百官表朝錯後無蚡邁但四年有御史大夫介又田蚡傳不言為御史大夫疑介即岑邁以四年除以六年免也又案高祖功臣表陽陵侯乃傳寬封孝惠六年頃侯靖嗣孝文十五年恭侯則嗣孝景前四年侯偃嗣豈偃介邁是一人三文互異而岑非姓與孝景前六年六月十四日丁丑三年商橫困敦小十二正月大戊戌二月小戊辰三月大丁酉四月大丁卯五月小丁酉六月大丙寅七月小丙甲八月大乙丑九月小乙未十月大甲子十一月小甲午十二月大癸亥史記本紀正月甲寅十七日甲子二十七日漢書本紀二月癸酉六日史記名臣表丙子九日是日武帝即位漢書本紀作甲子非孝武建元元年昭陽赤奮若大十三
