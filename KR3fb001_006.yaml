body:
  text: 錯以己巳爲元事下大史令修上言漢所作注不與見食相應者二事以同爲異者二十九事尙書召穀城門候劉洪敕日前郎中馮光司徒掾陳晃各訟厤故議郎蔡邕共補續其志今洪其詣修與漢相參推元課分考校月食審己巳元密近有師法洪便從漢受漢不能對洪上言推元漢己巳元則考靈曜旃蒙之歲乙卯元也與光晃甲寅元相經緯于以追天作厤校三光之步今爲疏闊孔子緯一事見二端者明厤興廢隨天爲節甲寅厤于孔子時效己巳顓頊秦所𢻱用漢興草創因而不易至元封中迂闊不審更用大初應期三百改厤之節甲寅己巳讖雖有文略其年數是以學人各傳所聞至于課校㒺得厥正夫甲寅元天正甲子朔旦冬至七曜之起始于牛初乙卯之元人正己巳朔旦立春三光聚天廟五度課兩元端閏餘差自五十分二之三自五十分二之三當爲百五十二分之三朔三百四中節之餘二十九以效信難聚疑有誤漢不解說但言先人有書而巳以漢成注參官𢻱行術不同二十九事不中見食二事案漢習書見己巳元謂朝不聞不知聖人獨有廢興之義史官有坿天
