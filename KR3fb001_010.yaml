body:
  text: 又顓頊厤元歲抂乙卯而命厤序云此術設元甲寅又古六術並用四分唐書律厤志魯宣公十五年丁卯歲顓頊第十三蔀首與麟德厤俱以丁巳平旦立春至始皇三十三年丁亥凡三百八十歲得顓頊厤壬申蔀首是歲秦厤以壬申寅初立春又秦厤上元正月己巳朔晨初立春日月五星俱起營室五度蔀首日名皆直四孟又秦厤十二次立春抂營室五度于大初星歫危十六度少也昏畢八度中月令參中爲合殷厤也晨心八度中月令尾中于大初星歫尾也仲春昏東井十四度中月令弧中弧星入東井十八度晨南斗二度中月令建中于大初星歫西建也案此乃僧一行所衍説秦厤無此原文也又顓頊厤立春起營室五度冬至抂牽牛一度少又顓頊厤上元甲寅正月甲寅晨初合朔立春七曜皆直艮維之首蓋重黎受職于顓頊九黎亂德二官咸廢帝堯復立其子孫命掌天地四時以及虞夏故本其所
  hash: sha256:228c1f445d9a471085c7c9918033998f9001e479ed9adf8c34690b4efd20e806
