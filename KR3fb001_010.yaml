body:
  text: 又顓頊曆元歲抂乙卯而命曆序云此術設元甲寅又古六術並用四分唐書律曆志魯宣公十五年丁卯歲顓頊第十三蔀首與麟德曆俱以丁巳平旦立春至始皇三十三年丁亥凡三百八十歲得顓頊曆壬申蔀首是歲秦曆以壬申寅初立春又秦曆上元正月己巳朔晨初立春日月五星俱起營室五度蔀首日名皆直四孟又秦曆十二次立春抂營室五度于大初星歫危十六度少也昏畢八度中月令參中為合殷曆也晨心八度中月令尾中于大初星歫尾也仲春昏東井十四度中月令弧中弧星入東井十八度晨南斗二度中月令建中于大初星歫西建也案此乃僧一行所衍説秦曆無此原文也又顓頊曆立春起營室五度冬至抂牽牛一度少又顓頊曆上元甲寅正月甲寅晨初合朔立春七曜皆直艮維之首蓋重黎受職于顓頊九黎亂德二官咸廢帝堯復立其子孫命掌天地四時以及虞夏故本其所
  hash: sha256:f94951e9abd9d315d84e6f8e75aa0b569511250ede2b7898f473104b6c63e622
