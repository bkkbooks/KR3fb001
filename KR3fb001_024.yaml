body:
  text: 九月庚子史記始皇本紀注引大原真人茅盈內紀勳案九月無庚子庚子後九月二十一日此注所引不經不可信三十二年遊兆淹茂小十二端月小戊寅二月大丁未三月小丁丑四月大丙午五月小丙子六月大乙巳七月小乙亥八月大甲辰九月小甲戌十月大癸卯十一月大癸酉十二月小癸卯三十三年強梧大淵獻小十二端月大壬申二月小壬寅三月大辛未四月小辛丑五月大庚午六月小庚子七月大己巳八月小己亥九月大戊辰十月小戊戌十一月大丁卯十二月小丁酉三十四年徒維困敦大十三端月大丙寅二月小丙申三月大乙丑四月大乙未五月小乙丑六月大甲午七月小甲子八月大癸巳九月小癸亥後九月大壬辰十月小壬戌十一月大辛卯十二月小辛酉三十五年祝犂赤奮若小十二端月大庚寅二月小庚申三月大己丑四月小己未五月大戊子六月大戊午七月小戊子八月大丁巳
