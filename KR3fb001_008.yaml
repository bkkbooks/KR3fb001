body:
  text: 密術甲寅己巳前巳𢻱行效後格而巳不用河平疏闊史官巳廢之而漢以去事分爭殆非其意雖有師法與無同課又不近密其説蔀數術家所共知無所采取遣漢歸鄉里又顓頊元用乙卯漢興承秦初用乙卯春秋長厤春秋大凡七百七十九日其四十七日食三無甲乙顓頊厤得五百九日周髀經陰易之數日月之法十九歲爲一章四章爲一蔀七十六歲二十蔀爲一遂遂千五百二十歲三遂爲一首首四千五百六十歲七首爲一極極三萬一千九百二十歲生數皆終萬物復始天以更元作厤紀勳謹案周髀秦書也故言古者天子治周又引呂氏語呂氏卽不韋則此亦當是秦厤劉洪言顓頊厤與甲寅元相經緯甲寅元卽殷厤其術與周髀同但殷厤元用甲寅日起甲子而顓頊厤元用乙卯日起己巳也宋書律厤志五紀論黃帝厤有四法顓頊夏周並有二術
