body:
  text: 作戊寅是漢書本紀六月乙未晦日有食之史記功臣表九月丙子案九月無丙子此後宣平侯張敖四月封此前離侯鄧弱亦以四月戊寅封則義陵侯吳郢不宜以九月封者廁其間丙子當是四月九日十年焉逢執徐大十三正月小甲午二月大癸亥三月小癸巳四月大壬戌五月小壬辰六月大辛酉七月小辛卯八月大庚申九月小庚寅後九月大己未十月小己丑十一月大戊午十二月小戊子漢書本紀七月癸卯十三日史記功臣表十一年十二月癸巳六日甲寅二十七日丙辰二十九日十一年端蒙大荒落小十二正月大丁巳二月大丁亥三月小丁巳四月大丙戌五月小丙辰六月大乙酉七月小乙卯八月大甲申九月小甲寅十月大癸未十一月小癸丑十二月大壬午史記功臣表正月己未三日又祝阿侯封漢書別作己卯己卯二十三日諸侯王表庚午十四日功臣表辛未十五日漢書諸侯王表丙子二十日史記作三月與本紀不合非功臣表丙戌三十日史記作丙辰前年十二月有丙辰則正月無丙辰誤明矣史記功臣表二月丁亥
