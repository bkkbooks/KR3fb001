  text: 正月小癸丑二月大壬午三月小壬子四月大辛巳五月大辛亥六月小辛巳七月大庚戌八月小庚辰九月大己酉十月小己卯十一月大戊申十二月小戊寅漢書王子侯表正月丁卯十五日湖孰頃侯劉胥史記別作丁亥推校正月無丁亥誤本紀三月甲子十三日漢書功臣表二年十月癸巳十五日二年焉逢攝提格小十二正月大丁未二月小丁丑三月大丙午四月小丙子五月大乙巳六月小乙亥七月大甲辰八月大甲戌九月小甲辰十月大癸酉十一月小癸卯十二月大壬申漢書五行志二月乙巳晦日有食之本紀作三月乙亥晦未審孰為是功臣表三月丙辰十一日史記作二月誤王子侯表五月乙巳一日功臣表己巳二十五日史記作六月壬辰壬辰六月十八日王子侯表甲戌三十日六月甲午二十日邯會侯史記作甲子非史記王子侯表三年十月癸酉一日胡母侯漢書別作二月二月無癸酉非建元以來侯表三年十一月乙丑二十三日三年端蒙單閼大十三正月小壬寅二月大辛未三月小辛丑四月大庚午
