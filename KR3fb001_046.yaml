body:
  text: 正月大丁丑二月小丁未三月大丙子四月小丙午五月大乙亥六月小乙巳七月大甲戌八月小甲辰九月大癸酉後九月小癸卯十月大壬申十一月小壬寅十二月大辛未漢書本紀七年十月辛丑是日齊王肥薨史記肥薨抂七月推校十月無辛丑辛丑七月二十八日也史記為是七年尚章赤奮若小十二正月大辛丑二月小辛未三月大庚子四月小庚午五月大己亥六月小己巳七月大戊戌八月小戊辰九月大丁酉十月小丁卯十一月大丙申十二月小丙寅漢書本紀正月辛丑朔日有食之五月丁卯日有食之既二十九日也故不言晦朔八月戊寅十一日九月辛丑五日史記名臣表高后元年十一月甲子二十九日高后元年焉逢攝提格小十二正月大乙未二月小乙丑三月大甲午四月小甲子五月大癸巳六月大癸亥七月小癸巳八月大壬戌九月小壬辰十月大辛酉十一月小辛卯十二月大庚申史記惠景間侯表四月丙寅三日乙酉二十二日又博成敬侯馬
