body:
  text: 作二月誤史記功臣表三月丙寅十六日漢書作二月誤本紀四月甲辰二十五日丁未二十八日五月丙寅史記無月漢書冠以五月是十七日己巳二十日功臣表六月壬辰十四日孝惠元年強梧協洽大十三正月大丙午二月小丙子三月大乙巳四月小乙亥五月大甲辰六月小甲戌七月大癸卯八月小癸酉九月大壬寅後九月小壬申十月大辛丑十一月大辛未十二月小辛丑漢書功臣表九月癸卯二日二年徒維涒灘小十二正月大庚午二月小庚子三月大己巳四月小己亥五月大戊辰六月小戊戌七月大丁卯八月小丁酉九月大丙寅十月小丙申十一月大乙丑十二月小乙未漢書本紀正月癸酉四日乙亥六日史記惠景間侯表四月庚子二日漢書本紀七月辛未五日史記名臣表癸巳二十七日三年祝犂作噩小十二正月大甲子二月大甲午三月小甲子四月大癸巳
