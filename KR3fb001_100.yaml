body:
  text: 正月小癸酉二月大壬寅三月小壬申四月大辛丑五月小辛未六月大庚子七月小庚午八月大己亥九月小己巳後九月大戊戌十月小戊辰十一月大丁酉十二月小丁卯史記建元以來侯表正月乙亥三日漢書作五月庚戌五月無庚戌誤二月乙丑二十四日漢書本紀三月戊寅七日史記建元以來侯表五月丁丑七日漢書作丙戌丙戌十六日未知孰是六月乙亥六月無乙亥乙亥七月六日也是日下麾侯呼毒尼初封呼毒尼以胸奴降王侯漢書本紀是年秋胸奴昆邪王降呼毒尼當同來則是七月審矣七月壬午十三日是日侯胸奴降王渾邪等四人漢書表作三年非是諸侯王表七月丙子七日漢書表作壬子誤三年昭陽作噩小十二正月大丙申二月大丙寅三月小丙申四月大乙丑五月小乙未六月大甲子七月小甲午八月大癸亥九月小癸巳十月大壬戌十一月小壬辰十二月大辛酉漢書百官表三月壬辰三月無壬辰是日張湯為御史大夫史記名臣表湯為御史大夫抂元狩二年推二年三月二十一日是壬辰則百官表誤明矣四年橫艾淹茂小十二
