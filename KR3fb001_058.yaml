body:
  text: 月誤本紀三年十月丁酉晦日有食之漢書本紀十一月丁卯晦日有食之案史記本紀載前十月晦日食不載此食當是漢書賸出此蓧又史記二年十一月晦日有食之十二月望日又食徐廣曰一本作月食為是史記名臣表十一月壬子十五日十二月乙亥八日三年焉逢困敦小十二正月大丁酉二月小丁卯三月大丙申四月小丙寅五月大乙未六月小乙丑七月大甲午八月小甲子九月大癸巳十月大癸亥十一月小癸巳十二月大壬戌史記本紀六月辛卯二十七日七月辛亥十八日名臣表四年十二月乙巳十二月無乙巳百官表及漢書本紀皆同當是己巳之誤己巳八日四年端蒙赤奮若小十二正月小壬辰二月大辛酉三月小辛卯四月大庚申五月小庚寅六月大己未七月小己丑八月大戊午九月小戊子十月大丁巳十一月小丁亥十二月大丙辰史記名臣表正月甲午三日惠景閒侯表五月甲寅二十五日五年游兆攝提格大十三
